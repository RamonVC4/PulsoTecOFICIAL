<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceder - PULSOTEC</title>
    <link rel="stylesheet" href="../styles/styles_login.css">
</head>
<body class="login-page">
    <main class="login-container">

        <header class="return-to-index-header">
            <a href="../index.html">VOLVER A INICIO</a>
        </header>
        
        <section class="card" role="region" aria-labelledby="login-title">
            <h1 id="login-title" class="card-title">RECUPERAR CUENTA</h1>

            <form class="login-form" autocomplete="off" novalidate>

                <!-- Role switcher para elegir que tipo de cuenta tienes -->
                <div class="role-switch" role="tablist" aria-label="Seleccionar rol", id="role-switcher">
                    <input type="radio" id="role-autor" name="role" value="autor">
                    <input type="radio" id="role-manager" name="role" value="manager" checked>
                    <input type="radio" id="role-revisor" name="role" value="revisor">

                    <div class="tabs">
                        <label class="tab" for="role-autor" role="tab" aria-controls="tabpanel" aria-selected="false">AUTOR</label>
                        <label class="tab" for="role-manager" role="tab" aria-controls="tabpanel" aria-selected="true">MANAGER</label>
                        <label class="tab" for="role-revisor" role="tab" aria-controls="tabpanel" aria-selected="false">REVISOR</label>
                        <span class="pill" aria-hidden="true"></span>
                    </div>
                </div>

                <!-- El resto de los campos, solo aparecen si haces click en el role-switcher-->
                <div id="resto-del-form" hidden>
                    <div class="scrollable-container">      
                        <div class="field">
                            <label for="correo">Correo</label>
                            <input id="correo" name="correo" type="text" inputmode="text" autocomplete="" required placeholder="Ingresa tu correo">
                        </div>                      
                    </div>

                    <div class="actions">
                        <button type="button" class="btn-primary" id="boton-reestablecer-contra">REESTABLECER CONTRASEÑA</button>
                        <a class="link-ghost" href="./login.php" aria-label="regresar a login">REGRESAR</a>
                    </div>

                    <div class="scrollable-container" id="mensaje-mal" hidden>
                        <p>Algo salió mal, verifique su conexión</p>
                    </div>

                    <div class="scrollable-container" id="mensaje-bien" hidden>
                        <p>Le enviamos un correo, siga los pasos para reestablecer su contraseña</p>
                    </div>
                </div>
            </form>
        </section>
    </main>

    <footer class="brand-footer" aria-hidden="true">
        <span>P u l s o T e c&nbsp;&nbsp;V e r i f i c a</span>
    </footer>

    <!-- SCRIPT PARA EL REGISTRO -->
    <script type="module" src="../pages/script_recuperarPassword.js"></script>

</body>
</html>
